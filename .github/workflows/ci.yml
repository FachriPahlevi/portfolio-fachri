name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Print runtime info
        run: |
          set -euxo pipefail
          node --version
          npm --version
          pwd
          ls -la

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          set -o pipefail
          npm ci 2>&1 | tee frontend-npm-ci.log

      - name: Lint
        run: |
          set -o pipefail
          npm run lint 2>&1 | tee frontend-lint.log

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001
        run: |
          set -o pipefail
          npm run build 2>&1 | tee frontend-build.log

      - name: Upload frontend logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-ci-logs
          path: frontend/*.log
          if-no-files-found: ignore

  backend:
    name: Backend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend
        shell: bash

    env:
      DATABASE_URL: file:./dev.db
      FRONTEND_URL: http://localhost:3000
      JWT_SECRET: dev-secret
      JWT_EXPIRES_IN: 1d

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Print runtime info
        run: |
          set -euxo pipefail
          node --version
          npm --version
          pwd
          ls -la

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: |
          set -o pipefail
          npm ci 2>&1 | tee backend-npm-ci.log

      - name: Validate Prisma schema
        run: |
          set -o pipefail
          npx prisma validate 2>&1 | tee backend-prisma-validate.log

      - name: Generate Prisma client
        run: |
          set -o pipefail
          npm run prisma:generate 2>&1 | tee backend-prisma-generate.log

      - name: Lint
        run: |
          set -o pipefail
          npm run lint:check 2>&1 | tee backend-lint.log

      - name: Test
        run: |
          set -o pipefail
          npm run test 2>&1 | tee backend-test.log

      - name: Build
        run: |
          set -o pipefail
          npm run build 2>&1 | tee backend-build.log

      - name: Upload backend logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-ci-logs
          path: backend/*.log
          if-no-files-found: ignore

  docker:
    name: Docker Compose
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Docker Compose config
        run: |
          set -o pipefail
          docker compose config 2>&1 | tee docker-compose-config.log

      - name: Upload Docker logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docker-ci-logs
          path: docker-compose-config.log
          if-no-files-found: ignore
